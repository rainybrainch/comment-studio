<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMENET 人格スタジオ — チャンネルOS</title>
<style>
:root {
  --bg:      #020609;
  --panel:   rgba(4,15,29,.92);
  --line:    rgba(255,255,255,.12);
  --text:    #f8fafc;
  --muted:   rgba(248,250,252,.62);
  --faint:   rgba(248,250,252,.35);
  --accent:  #d8b84f;
  --cyan:    #49d4ff;
  --good:    #57d68d;
  --danger:  #ff6b7a;
  --warn:    #f2c14e;
  --amenet:  #a78bfa;
  --radius:  10px;
  --font:    "Yu Gothic","Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,system-ui,sans-serif;
  --fs-xs:9.5px;--fs-sm:11px;--fs-md:12.5px;--fs-lg:14px;--fs-xl:18px;--fs-2xl:24px;
  --fw-bold:900;--fw-black:950;
  --tr:.18s cubic-bezier(.4,0,.2,1);
  color-scheme:dark;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:var(--font);color:var(--text)}
body{
  background:
    radial-gradient(circle at 15% 0%,rgba(167,139,250,.10),transparent 35%),
    radial-gradient(circle at 85% 90%,rgba(73,212,255,.08),transparent 35%),
    linear-gradient(135deg,#020609,#060f1a 55%,#030609);
}
canvas#rain{position:fixed;inset:0;pointer-events:none;z-index:0}
.page{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:16px 12px 60px}

/* ── ヘッダー ── */
.studio-header{text-align:center;padding:20px 0 14px}
.studio-eyebrow{font-size:var(--fs-xs);letter-spacing:.18em;color:var(--amenet);opacity:.8;text-transform:uppercase;margin-bottom:6px}
.studio-title{font-size:var(--fs-2xl);font-weight:var(--fw-black);letter-spacing:-.01em}
.studio-title span{color:var(--amenet)}
.studio-sub{font-size:var(--fs-sm);color:var(--muted);margin-top:4px}

/* ── 統計バー ── */
.stats-bar{
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
  margin:10px 0 16px;
}
.stat{
  background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);
  border-radius:20px;padding:4px 14px;font-size:var(--fs-xs);color:var(--amenet);
}
.stat strong{font-weight:var(--fw-black);font-size:var(--fs-sm)}

/* ── タブ ── */
.tab-bar{
  display:flex;gap:4px;border-bottom:1px solid var(--line);
  margin-bottom:16px;
}
.tab-btn{
  padding:8px 16px;font-size:var(--fs-sm);font-weight:var(--fw-bold);
  border:none;background:none;color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;transition:color var(--tr),border-color var(--tr);
}
.tab-btn.active{color:var(--amenet);border-bottom-color:var(--amenet)}
.tab-content{display:none}
.tab-content.active{display:block}

/* ── ツールバー ── */
.toolbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.toolbar-sep{flex:1}

button{
  min-height:32px;border:1px solid var(--line);border-radius:var(--radius);
  background:rgba(4,15,29,.6);color:var(--text);padding:5px 11px;
  font-size:var(--fs-sm);font-weight:var(--fw-black);cursor:pointer;
  transition:background var(--tr),border-color var(--tr),transform var(--tr);
  font-family:var(--font);
}
button:hover{background:rgba(4,15,29,.88)}
button:active{transform:scale(.97)}
button.primary{border-color:rgba(167,139,250,.5);background:rgba(167,139,250,.14);color:var(--amenet)}
button.primary:hover{background:rgba(167,139,250,.25)}
button.good{border-color:rgba(87,214,141,.5);background:rgba(87,214,141,.14);color:#8ff5c2}
button.good:hover{background:rgba(87,214,141,.25)}
button.accent{border-color:rgba(216,184,79,.5);background:rgba(216,184,79,.14);color:var(--accent)}
button.accent:hover{background:rgba(216,184,79,.25)}
button.danger{border-color:rgba(255,107,122,.4);background:rgba(255,107,122,.12);color:var(--danger)}
button.danger:hover{background:rgba(255,107,122,.22)}

/* ── 検索バー ── */
.search-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.search-row input,.search-row select{
  background:rgba(4,15,29,.7);border:1px solid var(--line);border-radius:var(--radius);
  color:var(--text);padding:6px 10px;font-size:var(--fs-sm);font-family:var(--font);
  outline:none;transition:border-color var(--tr);
}
.search-row input{flex:1;min-width:140px}
.search-row input:focus,.search-row select:focus{border-color:var(--amenet)}

/* ── カードグリッド ── */
.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:10px;
}
.persona-card{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:12px;cursor:pointer;transition:border-color var(--tr),transform var(--tr);
  position:relative;
}
.persona-card:hover{border-color:rgba(167,139,250,.4);transform:translateY(-1px)}
.persona-card.disabled{opacity:.45}

.card-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.card-avatar{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:var(--fw-black);overflow:hidden;
}
.card-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.card-info{flex:1;min-width:0}
.card-name{font-size:var(--fs-md);font-weight:var(--fw-black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-role{font-size:var(--fs-xs);color:var(--muted);margin-top:1px}
.card-no{
  position:absolute;top:8px;right:8px;
  font-size:var(--fs-xs);color:var(--faint);font-weight:var(--fw-black);
}

.card-catchphrase{
  font-size:var(--fs-xs);color:var(--muted);font-style:italic;
  margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.card-tag{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:4px;padding:1px 5px;font-size:var(--fs-xs);color:var(--faint);
}
.card-badges{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.badge-chip{
  background:rgba(216,184,79,.12);border:1px solid rgba(216,184,79,.3);
  border-radius:4px;padding:1px 6px;font-size:var(--fs-xs);color:var(--accent);
}
.card-footer{display:flex;align-items:center;gap:6px}
.card-toggle{
  display:flex;align-items:center;gap:4px;
  font-size:var(--fs-xs);color:var(--muted);
}
.toggle-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--faint);transition:background var(--tr);flex-shrink:0;
}
.toggle-dot.on{background:var(--good)}
.amenet-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--faint);flex-shrink:0;
}
.amenet-dot.on{background:var(--amenet)}
.card-freq{font-size:var(--fs-xs);color:var(--faint);margin-left:auto}

/* ── 空状態 ── */
.empty{
  text-align:center;padding:50px 20px;color:var(--muted);
}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-text{font-size:var(--fs-md);margin-bottom:16px}

/* ── AMENETプレビュー ── */
.amenet-preview-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.amenet-preview-title{
  font-size:var(--fs-lg);font-weight:var(--fw-black);color:var(--amenet);
}
.timeline{display:flex;flex-direction:column;gap:8px}
.post{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:12px;transition:border-color var(--tr);
}
.post:hover{border-color:rgba(167,139,250,.3)}
.post-header{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.post-avatar{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:var(--fw-black);overflow:hidden;
}
.post-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.post-name{font-size:var(--fs-sm);font-weight:var(--fw-black)}
.post-role{font-size:var(--fs-xs);color:var(--muted)}
.post-time{margin-left:auto;font-size:var(--fs-xs);color:var(--faint)}
.post-body{font-size:var(--fs-md);line-height:1.7;color:var(--text)}
.post-footer{
  display:flex;gap:14px;margin-top:8px;
  font-size:var(--fs-xs);color:var(--faint);
}
.post-badge-row{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.empty-preview{
  text-align:center;padding:40px;color:var(--muted);font-size:var(--fs-md);
}

/* ── モーダル ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.72);
  display:flex;align-items:center;justify-content:center;
  z-index:100;padding:12px;
  opacity:0;pointer-events:none;transition:opacity var(--tr);
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:#070f1d;border:1px solid rgba(167,139,250,.25);border-radius:14px;
  width:100%;max-width:520px;max-height:90vh;overflow-y:auto;
  padding:20px;
  transform:translateY(16px);transition:transform var(--tr);
}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-size:var(--fs-lg);font-weight:var(--fw-black);margin-bottom:16px;color:var(--amenet)}
.modal-close{float:right;background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:0;min-height:auto}

.field{margin-bottom:12px}
.field label{display:block;font-size:var(--fs-xs);color:var(--muted);margin-bottom:4px;font-weight:var(--fw-bold)}
.field input,.field textarea,.field select{
  width:100%;background:rgba(4,15,29,.8);border:1px solid var(--line);
  border-radius:var(--radius);color:var(--text);padding:7px 10px;
  font-size:var(--fs-sm);font-family:var(--font);outline:none;
  transition:border-color var(--tr);
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--amenet)}
.field textarea{resize:vertical;min-height:70px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field-section{
  font-size:var(--fs-xs);color:var(--amenet);font-weight:var(--fw-black);
  letter-spacing:.1em;text-transform:uppercase;
  margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid rgba(167,139,250,.2);
}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;flex-wrap:wrap}

.icon-preview{
  width:50px;height:50px;border-radius:50%;border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;overflow:hidden;margin-bottom:6px;background:rgba(4,15,29,.8);
}
.icon-preview img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* ── プリセットメニュー ── */
.dropdown{position:relative;display:inline-block}
.dropdown-menu{
  display:none;position:absolute;top:calc(100% + 4px);left:0;
  background:#070f1d;border:1px solid var(--line);border-radius:var(--radius);
  min-width:140px;z-index:10;overflow:hidden;
}
.dropdown-menu.open{display:block}
.dropdown-item{
  display:block;width:100%;text-align:left;padding:8px 12px;
  font-size:var(--fs-sm);color:var(--text);background:none;border:none;
  cursor:pointer;min-height:auto;border-radius:0;
  transition:background var(--tr);
}
.dropdown-item:hover{background:rgba(167,139,250,.12)}

.small{font-size:var(--fs-xs);color:var(--muted)}
.sync-bar{
  text-align:center;padding:6px;font-size:var(--fs-xs);
  color:var(--muted);background:rgba(87,214,141,.06);
  border:1px solid rgba(87,214,141,.15);border-radius:var(--radius);
  margin-bottom:10px;display:none;
}
.sync-bar.show{display:block}
</style>
</head>
<body>
<canvas id="rain"></canvas>
<div class="page">

  <div class="studio-header">
    <div class="studio-eyebrow">Channel OS — AMENET</div>
    <div class="studio-title"><span>AMENET</span> 人格スタジオ</div>
    <div class="studio-sub">AIコメント人格を定義・管理し、AMENETの住人として育てる</div>
  </div>

  <div class="stats-bar">
    <div class="stat">住人 <strong id="statTotal">0</strong></div>
    <div class="stat">配信ON <strong id="statEnabled">0</strong></div>
    <div class="stat">AMENET <strong id="statAmenet">0</strong></div>
    <div class="stat">バッジ総数 <strong id="statBadges">0</strong></div>
  </div>

  <div id="syncBar" class="sync-bar"></div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('list')">住人一覧</button>
    <button class="tab-btn" onclick="switchTab('preview')">AMENETプレビュー</button>
  </div>

  <!-- 住人一覧タブ -->
  <div id="tab-list" class="tab-content active">
    <div class="toolbar">
      <button class="primary" onclick="openCreate()">＋ 新規作成</button>
      <div class="dropdown" id="presetDropdown">
        <button onclick="toggleDropdown()">プリセット ▾</button>
        <div class="dropdown-menu" id="presetMenu">
          <button class="dropdown-item" onclick="addPreset('book');closeDropdown()">📚 本紹介セット</button>
          <button class="dropdown-item" onclick="addPreset('movie');closeDropdown()">🎬 映画セット</button>
          <button class="dropdown-item" onclick="addPreset('game');closeDropdown()">🎮 ゲームセット</button>
          <button class="dropdown-item" onclick="addPreset('default');closeDropdown()">✨ デフォルト人格</button>
        </div>
      </div>
      <div class="toolbar-sep"></div>
      <button class="accent" onclick="sendToStudio()">📡 スタジオ送信</button>
      <button onclick="exportJson()">⬇ JSON書出</button>
      <button onclick="document.getElementById('fileInput').click()">⬆ JSON読込</button>
      <button class="danger" onclick="clearAll()">全削除</button>
    </div>
    <div class="search-row">
      <input id="searchInput" type="search" placeholder="名前・タグで検索..." oninput="renderCards()">
      <select id="filterRole" onchange="renderCards()">
        <option value="">全roleType</option>
        <option>共感勢</option><option>質問勢</option><option>知識勢</option>
        <option>応援勢</option><option>ネタ勢</option><option>懐疑勢</option>
        <option>妄想勢</option><option>初心者勢</option>
      </select>
      <select id="filterAmenet" onchange="renderCards()">
        <option value="">全表示</option>
        <option value="on">AMENET ON</option>
        <option value="off">AMENET OFF</option>
      </select>
      <button onclick="toggleAll()">全ON/OFF切替</button>
    </div>
    <div class="cards-grid" id="cards"></div>
  </div>

  <!-- AMENETプレビュータブ -->
  <div id="tab-preview" class="tab-content">
    <div class="amenet-preview-header">
      <div class="amenet-preview-title">AMENET タイムライン</div>
      <button class="primary" onclick="renderTimeline()">🔄 更新</button>
    </div>
    <div class="timeline" id="timeline"></div>
  </div>

</div>

<!-- エディタモーダル -->
<div class="modal-overlay" id="editorModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="editorTitle">住人を編集</div>

    <div class="field-section">基本情報</div>
    <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:12px">
      <div>
        <div class="icon-preview" id="iconPreview">👤</div>
        <button style="font-size:var(--fs-xs);padding:3px 8px" onclick="document.getElementById('iconUpload').click()">画像</button>
        <input type="file" id="iconUpload" accept="image/*" style="display:none" onchange="onIconUpload(event)">
      </div>
      <div style="flex:1">
        <div class="field">
          <label>名前（8文字以内）</label>
          <input id="editName" maxlength="20" placeholder="例：本棚の声">
        </div>
        <div class="field-row">
          <div class="field">
            <label>カラー</label>
            <input id="editColor" type="color" value="#a78bfa" style="height:36px;cursor:pointer">
          </div>
          <div class="field">
            <label>テーマ</label>
            <select id="editTheme">
              <option value="book">本紹介</option>
              <option value="movie">映画</option>
              <option value="game">ゲーム</option>
              <option value="study">解説</option>
              <option value="talk">雑談</option>
              <option value="economy">経済</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div class="field">
      <label>口癖（キャッチフレーズ）</label>
      <input id="editCatchphrase" maxlength="40" placeholder="例：話の温度が上がったね。">
    </div>

    <div class="field-section">性格・役割</div>
    <div class="field">
      <label>roleType</label>
      <select id="editRoleType">
        <option>共感勢</option><option>質問勢</option><option>知識勢</option>
        <option>応援勢</option><option>ネタ勢</option><option>懐疑勢</option>
        <option>妄想勢</option><option>初心者勢</option>
      </select>
    </div>
    <div class="field">
      <label>口調・スタイル説明</label>
      <textarea id="editTone" placeholder="例：短く受け止める。話し手の座標を急に奪わない。"></textarea>
    </div>
    <div class="field">
      <label>専門分野</label>
      <input id="editSpeciality" placeholder="例：文化人類学、本要約、投資など">
    </div>
    <div class="field">
      <label>タグ（カンマ区切り）</label>
      <input id="editTags" placeholder="例：本,読書,解説">
    </div>
    <div class="field">
      <label>バッジ（カンマ区切り）</label>
      <input id="editBadges" placeholder="例：将棋バッジ,投資バッジ">
    </div>

    <div class="field-section">AMENET / 配信設定</div>
    <div class="field-row">
      <div class="field">
        <label>AMENETに表示</label>
        <select id="editAmenetActive">
          <option value="true">ON</option>
          <option value="false">OFF</option>
        </select>
      </div>
      <div class="field">
        <label>投稿頻度</label>
        <select id="editPostFrequency">
          <option value="high">高め</option>
          <option value="medium" selected>普通</option>
          <option value="low">低め</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>コメント長さ</label>
        <select id="editLength">
          <option value="short">短め</option>
          <option value="medium" selected>普通</option>
          <option value="long">長め</option>
        </select>
      </div>
      <div class="field">
        <label>配信コメントON</label>
        <select id="editEnabled">
          <option value="true">ON</option>
          <option value="false">OFF</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>セリフ例（1行1つ）</label>
      <textarea id="editExamples" style="min-height:110px" placeholder="例：今の言い方、かなり大事そう。&#10;そこ、少し余白を残して聞きたい。"></textarea>
    </div>
    <div class="field">
      <label>素材メモ（参考URL等）</label>
      <textarea id="editSource" placeholder="参考にした本・動画など"></textarea>
    </div>

    <div class="modal-actions">
      <button class="danger" id="deleteBtn" onclick="deletePersona()">削除</button>
      <button onclick="closeModal()">キャンセル</button>
      <button class="primary" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="application/json" style="display:none" onchange="importJson()">

<script>
(() => {
'use strict';

const STORAGE_KEY      = "ai_comment_overlay_personas_v1";
const STUDIO_KEY       = "all_domedia_personas_v5";
const FREQ_LABEL       = { high:'高', medium:'中', low:'低' };

/* ── デフォルト人格 ── */
const DEFAULT_PERSONAS = [
  mk("listener","傾聴さん","#60b7ff","short","talk",
     "短く受け止める。話し手の座標を急に奪わない。",
     ["今の言い方、かなり大事そう。","そこ、少し余白を残して聞きたい。","話の温度が上がったね。","その接続面、ちゃんと見えてる。"],
     "",""),
  mk("book","本棚の声","#f2c14e","medium","book",
     "本の構造や比喩を拾って静かに返す。",
     ["今の話は、章の見出しにすると強い。","本から人格が立ち上がる感じ、ここで起きてる。","要約よりも、読後の姿勢がコメントになってる。"],
     "",""),
  mk("anthro","文化人類学者","#57d68d","long","study",
     "個人と世界、儀礼、空気を観察する。",
     ["内容だけでなく、場にどんな安心が発生しているかを見ると面白い。","コメント欄は評価欄ではなく、共同体の呼吸として設計できる。"],
     "文化人類学",""),
];

function mk(id,name,color,length,theme,tone,examples,speciality,catchphrase){
  return {
    id,name,color,length,theme,tone,examples,
    speciality:speciality||"",catchphrase:catchphrase||"",
    tags:[],badges:[],source:"",roleType:"知識勢",
    enabled:true,amenetActive:true,postFrequency:"medium",
    createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()
  };
}

/* ── データ ── */
let personas = load();
let editingId = null;
let iconDataUrl = null;

function load(){
  try{
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");
    // 既存データに新フィールドのデフォルトを補完
    return raw.map(p=>({
      amenetActive: true,
      postFrequency:"medium",
      speciality:"",
      catchphrase:"",
      badges:[],
      icon:"",
      ...p,
      tags: Array.isArray(p.tags) ? p.tags : parseTags(p.tags),
      badges: Array.isArray(p.badges) ? p.badges : [],
      examples: Array.isArray(p.examples) ? p.examples : [],
    }));
  }catch{return[]}
}

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(personas));
  updateStats();
  renderCards();
}

function parseTags(v){
  if(Array.isArray(v)) return v;
  return String(v||"").split(/[,、\s]+/).map(s=>s.trim()).filter(Boolean);
}

/* ── 統計 ── */
function updateStats(){
  document.getElementById("statTotal").textContent    = personas.length;
  document.getElementById("statEnabled").textContent  = personas.filter(p=>p.enabled!==false).length;
  document.getElementById("statAmenet").textContent   = personas.filter(p=>p.amenetActive!==false).length;
  document.getElementById("statBadges").textContent   = personas.reduce((s,p)=>s+(p.badges||[]).length,0);
}

/* ── タブ ── */
function switchTab(tab){
  document.querySelectorAll(".tab-content").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(el=>el.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  document.querySelectorAll(".tab-btn")[tab==="list"?0:1].classList.add("active");
  if(tab==="preview") renderTimeline();
}
window.switchTab = switchTab;

/* ── カード描画 ── */
function renderCards(){
  const q   = (document.getElementById("searchInput").value||"").toLowerCase();
  const r   = document.getElementById("filterRole").value;
  const am  = document.getElementById("filterAmenet").value;
  const container = document.getElementById("cards");

  const filtered = personas.filter(p=>{
    const text = (p.name+" "+(p.tags||[]).join(" ")+" "+(p.speciality||"")).toLowerCase();
    if(q && !text.includes(q)) return false;
    if(r && p.roleType !== r) return false;
    if(am==="on"  && p.amenetActive===false) return false;
    if(am==="off" && p.amenetActive!==false) return false;
    return true;
  });

  if(!filtered.length){
    container.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div class="empty-icon">🌧</div>
      <div class="empty-text">${personas.length?"条件に一致する住人がいません":"住人がまだいません"}</div>
      ${!personas.length?`<button class="primary" onclick="openCreate()">＋ 最初の住人を作る</button>`:""}
    </div>`;
    return;
  }

  container.innerHTML = filtered.map((p,i)=>{
    const enabled  = p.enabled !== false;
    const amOn     = p.amenetActive !== false;
    const avatar   = p.icon
      ? `<img src="${esc(p.icon)}" alt="">`
      : initials(p.name);
    const tags    = (p.tags||[]).slice(0,3).map(t=>`<span class="card-tag">${esc(t)}</span>`).join("");
    const badges  = (p.badges||[]).slice(0,3).map(b=>`<span class="badge-chip">🏅${esc(b)}</span>`).join("");
    const freq    = FREQ_LABEL[p.postFrequency||"medium"]||"中";
    return `
    <div class="persona-card${!enabled?" disabled":""}" onclick="openEdit('${esc(p.id)}')">
      <div class="card-no">#${i+1}</div>
      <div class="card-header">
        <div class="card-avatar" style="background:${esc(p.color||"#555")}">${avatar}</div>
        <div class="card-info">
          <div class="card-name">${esc(p.name)}</div>
          <div class="card-role">${esc(p.roleType||"")} · ${themeLabel(p.theme)}</div>
        </div>
      </div>
      ${p.catchphrase?`<div class="card-catchphrase">「${esc(p.catchphrase)}」</div>`:""}
      ${tags?`<div class="card-tags">${tags}</div>`:""}
      ${badges?`<div class="card-badges">${badges}</div>`:""}
      <div class="card-footer">
        <span class="card-toggle">
          <span class="toggle-dot${enabled?" on":""}"></span>配信
        </span>
        <span class="card-toggle">
          <span class="amenet-dot${amOn?" on":""}"></span>AMENET
        </span>
        <span class="card-freq">投稿${freq}</span>
      </div>
    </div>`;
  }).join("");
}

/* ── AMENETプレビュー ── */
function renderTimeline(){
  const tl = document.getElementById("timeline");
  const active = personas.filter(p=>p.amenetActive!==false && (p.examples||[]).length>0);
  if(!active.length){
    tl.innerHTML = `<div class="empty-preview">AMENETに表示する住人がいません。<br>住人のAMENET設定をONにしてください。</div>`;
    return;
  }

  const posts = [];
  // 各住人から1〜2投稿サンプリング
  active.forEach(p=>{
    const count = p.postFrequency==="high"?2:1;
    const shuffled = [...p.examples].sort(()=>Math.random()-.5);
    for(let i=0;i<Math.min(count,shuffled.length);i++){
      posts.push({persona:p, text:shuffled[i]});
    }
  });
  // シャッフル
  posts.sort(()=>Math.random()-.5);

  const now = Date.now();
  tl.innerHTML = posts.map((post,idx)=>{
    const p    = post.persona;
    const mins = (idx*3 + Math.floor(Math.random()*3));
    const time = mins===0?"たった今":`${mins}分前`;
    const avatar= p.icon
      ? `<img src="${esc(p.icon)}" alt="">`
      : initials(p.name);
    const badges=(p.badges||[]).slice(0,3).map(b=>`<span class="badge-chip">🏅${esc(b)}</span>`).join("");
    const likes  = Math.floor(Math.random()*30)+1;
    const reposts= Math.floor(Math.random()*8);
    return `
    <div class="post">
      <div class="post-header">
        <div class="post-avatar" style="background:${esc(p.color||"#555")}">${avatar}</div>
        <div>
          <div class="post-name">${esc(p.name)}</div>
          <div class="post-role">${esc(p.roleType||"")} · ${themeLabel(p.theme)}</div>
        </div>
        <div class="post-time">${time}</div>
      </div>
      <div class="post-body">${esc(post.text)}</div>
      ${badges?`<div class="post-badge-row">${badges}</div>`:""}
      <div class="post-footer">
        <span>♥ ${likes}</span>
        <span>🔁 ${reposts}</span>
        <span>💬 0</span>
      </div>
    </div>`;
  }).join("");
}

/* ── モーダル ── */
function openCreate(){
  editingId  = null;
  iconDataUrl= null;
  document.getElementById("editorTitle").textContent = "新しい住人を作る";
  document.getElementById("deleteBtn").style.display = "none";
  resetForm({
    name:"",color:"#a78bfa",theme:"talk",tone:"",catchphrase:"",
    roleType:"共感勢",speciality:"",tags:[],badges:[],
    examples:[],source:"",enabled:true,amenetActive:true,
    postFrequency:"medium",length:"short",icon:""
  });
  openModal();
}

function openEdit(id){
  const p = personas.find(x=>x.id===id);
  if(!p) return;
  editingId  = id;
  iconDataUrl= p.icon||null;
  document.getElementById("editorTitle").textContent = "住人を編集";
  document.getElementById("deleteBtn").style.display = "";
  resetForm(p);
  openModal();
}
window.openCreate = openCreate;
window.openEdit   = openEdit;

function resetForm(p){
  document.getElementById("editName").value         = p.name||"";
  document.getElementById("editColor").value        = p.color||"#a78bfa";
  document.getElementById("editTheme").value        = p.theme||"talk";
  document.getElementById("editCatchphrase").value  = p.catchphrase||"";
  document.getElementById("editRoleType").value     = p.roleType||"共感勢";
  document.getElementById("editTone").value         = p.tone||"";
  document.getElementById("editSpeciality").value   = p.speciality||"";
  document.getElementById("editTags").value         = (p.tags||[]).join(", ");
  document.getElementById("editBadges").value       = (p.badges||[]).join(", ");
  document.getElementById("editAmenetActive").value = String(p.amenetActive!==false);
  document.getElementById("editPostFrequency").value= p.postFrequency||"medium";
  document.getElementById("editLength").value       = p.length||"short";
  document.getElementById("editEnabled").value      = String(p.enabled!==false);
  document.getElementById("editExamples").value     = (p.examples||[]).join("\n");
  document.getElementById("editSource").value       = p.source||"";
  updateIconPreview(p.icon||"");
}

function updateIconPreview(src){
  const el = document.getElementById("iconPreview");
  if(src){
    el.innerHTML = `<img src="${esc(src)}" alt="">`;
  } else {
    const name = document.getElementById("editName").value||"?";
    el.innerHTML = initials(name);
  }
}

function onIconUpload(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    iconDataUrl = ev.target.result;
    updateIconPreview(iconDataUrl);
  };
  reader.readAsDataURL(file);
}
window.onIconUpload = onIconUpload;

function saveEdit(){
  const name = document.getElementById("editName").value.trim();
  if(!name){ alert("名前を入力してください"); return; }
  const now  = new Date().toISOString();
  const data = {
    name,
    color:          document.getElementById("editColor").value,
    theme:          document.getElementById("editTheme").value,
    catchphrase:    document.getElementById("editCatchphrase").value.trim(),
    roleType:       document.getElementById("editRoleType").value,
    tone:           document.getElementById("editTone").value.trim(),
    speciality:     document.getElementById("editSpeciality").value.trim(),
    tags:           parseTags(document.getElementById("editTags").value),
    badges:         parseTags(document.getElementById("editBadges").value),
    amenetActive:   document.getElementById("editAmenetActive").value === "true",
    postFrequency:  document.getElementById("editPostFrequency").value,
    length:         document.getElementById("editLength").value,
    enabled:        document.getElementById("editEnabled").value === "true",
    examples:       document.getElementById("editExamples").value.split("\n").map(s=>s.trim()).filter(Boolean),
    source:         document.getElementById("editSource").value.trim(),
    icon:           iconDataUrl||"",
    updatedAt:      now,
  };

  if(editingId){
    const idx = personas.findIndex(p=>p.id===editingId);
    if(idx>=0) personas[idx] = { ...personas[idx], ...data };
  } else {
    personas.unshift({ id:`p_${Date.now()}`, createdAt:now, ...data });
  }
  save();
  closeModal();
}
window.saveEdit = saveEdit;

function deletePersona(){
  if(!editingId) return;
  if(!confirm("この住人を削除しますか？")) return;
  personas = personas.filter(p=>p.id!==editingId);
  save();
  closeModal();
}
window.deletePersona = deletePersona;

function openModal(){
  document.getElementById("editorModal").classList.add("open");
}
function closeModal(){
  document.getElementById("editorModal").classList.remove("open");
}
window.closeModal = closeModal;

/* ── 一括ON/OFF ── */
function toggleAll(){
  const shouldEnable = personas.some(p=>p.enabled===false);
  personas = personas.map(p=>({...p,enabled:shouldEnable,updatedAt:new Date().toISOString()}));
  save();
}
window.toggleAll = toggleAll;

/* ── プリセット ── */
function addPreset(type){
  const now = Date.now();
  let items = [];
  if(type==="default"){
    const ids = new Set(personas.map(p=>p.id));
    items = DEFAULT_PERSONAS.filter(p=>!ids.has(p.id));
  } else if(type==="book")  items = bookPreset(now);
  else if(type==="movie")   items = moviePreset(now);
  else if(type==="game")    items = gamePreset(now);
  if(!items.length){ alert("すでに追加済みです"); return; }
  personas = [...items, ...personas];
  save();
}
window.addPreset = addPreset;

function mkPreset(seed,theme,name,color,tone,length,examples){
  return {
    id:`preset_${theme}_${seed}`,name,color,tone,length,theme,
    enabled:true,amenetActive:true,postFrequency:"medium",
    tags:[themeLabel(theme)],badges:[],source:"",examples,
    catchphrase:"",speciality:"",roleType:"共感勢",
    createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),icon:""
  };
}
function bookPreset(now){return[
  mkPreset(now,"book","読者代表","#60b7ff","初見の読者として、素朴な疑問と共感を短く返す。","short",["ここ、初見だとかなり気になる。","その本、入り口はどこからが良さそう？","今の説明で読みたくなってきた。"]),
  mkPreset(now+1,"book","編集者","#f2c14e","話の見出し、構成、伝わりやすさを拾って補足する。","medium",["今の話、動画タイトルにすると強い。","この本の核は今の一文に寄ってる気がする。"]),
  mkPreset(now+2,"book","批評家","#57d68d","テーマ、思想、読後感を少し深めにコメントする。","long",["この本は知識より、読んだ後の姿勢を変えるタイプに見える。","著者の主張と話し手の経験が重なるところが面白い。"]),
];}
function moviePreset(now){return[
  mkPreset(now,"movie","観客","#60b7ff","観客席のリアクションとして、感情を短く返す。","short",["そのシーン、普通に見たい。","今の説明だけで絵が浮かぶ。"]),
  mkPreset(now+1,"movie","批評家","#f2c14e","脚本、構図、演出を拾って補足する。","medium",["今の話は演出の見どころとして強い。","その映画、テーマの出し方が気になる。"]),
  mkPreset(now+2,"movie","ネタバレ警戒","#ff6b7a","言い過ぎを軽く止め、視聴意欲を守る。","short",["そこはまだ伏せてもいいかも。","今の言い方なら初見にも優しい。"]),
];}
function gamePreset(now){return[
  mkPreset(now,"game","初見プレイヤー","#57d68d","プレイヤー目線で驚き、発見を短く返す。","short",["今の動き、普通にうまい。","この展開、初見だとかなり熱い。"]),
  mkPreset(now+1,"game","攻略メモ","#60b7ff","操作、ルート、次の一手を軽く補足する。","medium",["ここは一度、周囲を見てもよさそう。","今の選択肢、あとで効いてきそう。"]),
  mkPreset(now+2,"game","盛り上げ隊","#f2c14e","実況のテンションを上げるが邪魔しない。","short",["ここ勝負どころ。","コメント欄がざわつく場面きた。"]),
];}

/* ── エクスポート/インポート ── */
function exportJson(){
  const blob = new Blob([JSON.stringify(personas,null,2)],{type:"application/json"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url;
  a.download = `amenet-personas-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function importJson(){
  const file = document.getElementById("fileInput").files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const imported = JSON.parse(String(reader.result||"[]"));
      if(!Array.isArray(imported)) throw new Error("配列ではありません");
      const ids = new Set(personas.map(p=>p.id));
      const merged = imported.map(p=>ids.has(p.id)?{...p,id:`${p.id}_${Date.now()}`}:p);
      personas = [...merged,...personas];
      save();
      alert(`${merged.length}件読み込みました`);
    }catch(e){ alert("読み込み失敗: "+e.message); }
    finally{ document.getElementById("fileInput").value=""; }
  };
  reader.readAsText(file);
}
window.exportJson = exportJson;
window.importJson = importJson;

/* ── スタジオ送信 ── */
function sendToStudio(){
  const enabled = personas.filter(p=>p.enabled!==false);
  if(!enabled.length){ alert("配信ONの住人がいません"); return; }
  const converted = enabled.map(p=>({
    id:          p.id,
    name:        p.name,
    color:       p.color,
    genre:       themeToGenre(p.theme),
    instruction: p.tone||"",
    examples:    p.examples||[],
    catchphrase: p.catchphrase||"",
    roleType:    p.roleType||"共感勢",
    suffixStyle: "",
    words:       (p.tags||[]).filter(t=>t.length>=2&&t.length<=8).slice(0,5),
    avoidStyle:  "",
    interests:   (p.tags||[]).slice(0,5),
    source:      p.source||"",
    enabled:     true
  }));
  localStorage.setItem(STUDIO_KEY, JSON.stringify(converted));
  const bar = document.getElementById("syncBar");
  bar.textContent = `コメントスタジオに ${enabled.length} 件の住人を送信しました ✓`;
  bar.classList.add("show");
  setTimeout(()=>bar.classList.remove("show"),5000);
  window.open("ai-comment-system.html","_blank");
}
window.sendToStudio = sendToStudio;

/* ── 全削除 ── */
function clearAll(){
  if(!confirm("全住人を削除しますか？JSONで書き出していない場合は戻せません。")) return;
  personas = [];
  localStorage.setItem(STORAGE_KEY,"[]");
  save();
}
window.clearAll = clearAll;

/* ── ドロップダウン ── */
function toggleDropdown(){
  document.getElementById("presetMenu").classList.toggle("open");
}
function closeDropdown(){
  document.getElementById("presetMenu").classList.remove("open");
}
window.toggleDropdown = toggleDropdown;
window.closeDropdown  = closeDropdown;
document.addEventListener("click",e=>{
  const dd = document.getElementById("presetDropdown");
  if(!dd.contains(e.target)) closeDropdown();
});
document.getElementById("editorModal").addEventListener("click",e=>{
  if(e.target===document.getElementById("editorModal")) closeModal();
});

/* ── ユーティリティ ── */
function esc(s){
  return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
}
function initials(name){
  const s = String(name||"?");
  return s.charAt(0);
}
function themeLabel(t){
  return {book:"本紹介",movie:"映画",game:"ゲーム",study:"解説",talk:"雑談",economy:"経済"}[t]||"雑談";
}
function themeToGenre(t){
  return {book:"book",movie:"movie",game:"game",study:"study",talk:"book",economy:"economy"}[t]||"book";
}

/* ── 初期化 ── */
updateStats();
renderCards();

/* ── 雨アニメーション ── */
const cv=document.getElementById("rain"),cx=cv.getContext("2d");
let dr=[];
function ir(){
  cv.width=innerWidth;cv.height=innerHeight;
  dr=Array.from({length:70},()=>({
    x:Math.random()*cv.width,y:Math.random()*cv.height,
    l:8+Math.random()*14,s:1.4+Math.random()*2,o:0.06+Math.random()*0.2
  }));
}
function rain(){
  cx.clearRect(0,0,cv.width,cv.height);
  dr.forEach(d=>{
    cx.beginPath();cx.moveTo(d.x,d.y);cx.lineTo(d.x-.6,d.y+d.l);
    cx.strokeStyle=`rgba(167,139,250,${d.o})`;cx.lineWidth=.5;cx.stroke();
    d.y+=d.s;if(d.y>cv.height){d.y=-d.l;d.x=Math.random()*cv.width}
  });
  requestAnimationFrame(rain);
}
ir();rain();addEventListener("resize",ir);

})();
